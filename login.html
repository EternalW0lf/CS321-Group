<!DOCTYPE html>
<html>
<head>
  <title>Login - RBO</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="topbar">
  <a href="index.html" class="brand"> <!-- Logo and Brand Name that links to the home page -->
    <img src="logo.png" alt="RBO Logo" class="logo" />
    <span class="brand-name">Restaurant Budget Optimizer</span>
  </a>
</header>

<main class="page">
  <div class="main-card small">
    <h1>Log In</h1>

    <form onsubmit="handleLogin(event)"> 
      <input type="text" id="username" placeholder="Username" class="input" /> <!-- Input field for username -->
      <input type="password" id="password" placeholder="Password" class="input" /> <!-- Input field for password -->

      <button type="submit" class="primary-btn">Log In</button> <!-- Button to submit the login form and trigger the handleLogin function in script.js -->
    </form>

    <p class="link-text"> Don’t have an account? <a href="signup.html">Sign up</a></p> <!-- Link to the signup page for users who don't have an account -->
  </div>
</main>

<script src="script.js"></script>
</body>
</html>
